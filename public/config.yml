backend:
  name: github
  repo: itsadityapidurkar/ctf-writeups
  branch: main
  base_url: https://writeups.adityapidurkar.in # Your custom domain on Vercel
  auth_endpoint: api/auth

media_folder: "public/assets"
public_folder: "/assets"

collections:
  - name: "writeups"
    label: "CTF Writeups"
    folder: "src/content/writeups"
    create: true
    slug: "{{slug}}"
    nested:
      depth: 3
      subfolders: false
    path: "{{ctfId}}/{{category}}/{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - label: "CTF Event"
        name: "ctfId"
        widget: "relation"
        collection: "ctfs"
        value_field: "id"
        display_fields: ["name"]
        search_fields: ["name", "id"]
      - { label: "Category", name: "category", widget: "string", hint: "Category folder name, lowercase and hyphenated, e.g., general-skills, forensics" }
      - { label: "Difficulty", name: "difficulty", widget: "select", options: ["Easy", "Medium", "Hard"], required: false }
      - { label: "Flag", name: "flag", widget: "string", required: false }
      - { label: "Banner Image Filename", name: "banner", widget: "string", default: "placeholder.png", hint: "Filename of the banner in assets/, e.g., picoctf.png" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "ctfs"
    label: "CTFs"
    folder: "src/data/ctfs"
    create: true
    extension: "json"
    format: "json"
    slug: "{{id}}"
    identifier_field: "name"
    fields:
      - { label: "CTF ID", name: "id", widget: "string", hint: "Lowercase, matching directory name, e.g., picoctf" }
      - { label: "CTF Name", name: "name", widget: "string", hint: "Display name, e.g., picoCTF" }
      - { label: "Status", name: "status", widget: "select", options: ["active", "ended"] }
      - { label: "Banner Image", name: "banner", widget: "string", default: "placeholder.png", hint: "Filename in assets/, e.g., picoctf.png" }

  - name: "settings"
    label: "Settings"
    delete: false
    files:
      - name: "general"
        label: "General Configuration"
        file: "src/data/settings.json"
        fields:
          - { label: "Site Title", name: "siteTitle", widget: "string" }
          - { label: "Author Name", name: "author", widget: "string" }
          - { label: "SEO Description", name: "description", widget: "text" }
          - { label: "GitHub URL", name: "githubUrl", widget: "string" }
          - { label: "Homepage Hero Title", name: "heroTitle", widget: "string" }
          - { label: "Homepage Hero Subtitle", name: "heroSubtitle", widget: "text" }
